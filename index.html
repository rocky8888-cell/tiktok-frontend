<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Coins Mock</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <div class="topbar">
        <img src="images/logo.png" class="logo">
        <div class="brand-text">
            <div class="title">TikTok</div>
            <div class="subtitle">Purchase Coins</div>
        </div>
    </div>

    <!-- Search -->
    <div class="search-row">
        <input id="tiktokId" type="text" placeholder="Enter TikTok ID">
        <button id="searchBtn">Search</button>
    </div>

    <!-- Title -->
    <div class="container">
        <h1>Purchase TikTok Coins</h1>
    </div>

    <!-- Coins Grid -->
    <div id="coinsGrid" class="grid"></div>

    <!-- TikTok Extra Banner -->
    <div class="extra-img-box">
        <img src="images/extra_banner.jpg" class="extra-img">
    </div>

    <!-- Selected Summary -->
    <div class="summary-row">
        <div class="selected-info">
            <div id="selectedText">Selected: 0 Coins</div>
            <div id="selectedUSD">US$0.00</div>
        </div>
        <button id="payBtn" class="recharge-btn" disabled>Recharge</button>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-box">
            <h2>Choose payment method</h2>

            <div class="method-row">
                <div class="method"><img class="payicon" src="images/pay_applepay.svg"> Apple Pay</div>
                <div class="method"><img class="payicon visa-icon" src="images/visa_logo.png"> Visa ******61941</div>
                <div class="method"><img class="payicon" src="images/pay_paypal.svg"> PayPal</div>
                <div class="method"><img class="payicon" src="images/pay_mastercard.svg"> Mastercard</div>
            </div>

            <div class="modal-actions">
                <button id="cancelPay" class="modal-btn-red">Cancel</button>
                <button id="confirmPay" class="modal-btn-red">Recharge</button>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="modal">
        <div class="modal-box">
            <img id="checkmark" src="images/check_success.svg">
            <div id="successText">Payment completed</div>
            <div id="coins">Recharged 0 Coins</div>
            <button id="goBack" class="btn">Go Back</button>
        </div>
    </div>

    <!-- Custom Coins Popup -->
    <div id="customModal" class="modal">
        <div class="modal-box" style="text-align:center">
            <h2>Select Coin Amount</h2>

            <div id="customRange" style="margin:10px 0 20px 0; font-size:16px; color:#666;">
                30 - 2,500,000
            </div>

            <!-- Input + Summary -->
            <div style="margin-bottom: 12px;">
                <div id="customInputBox"
                    style="padding:12px;border:1px solid #ddd;border-radius:12px;margin-bottom:10px;font-size:22px;">
                    0
                </div>
                <div id="customModalCoins" style="font-size:16px; color:#333;">0 Coins</div>
                <div id="customModalUSD" style="font-size:16px; color:#333;">US$0.00</div>
            </div>

            <!-- Number Pad -->
            <div class="number-grid">
                <button class="num">1</button>
                <button class="num">2</button>
                <button class="num">3</button>
                <button class="del">⌫</button>

                <button class="num">4</button>
                <button class="num">5</button>
                <button class="num">6</button>
                <button class="num">000</button>

                <button class="num">7</button>
                <button class="num">8</button>
                <button class="num">9</button>
                <button class="num">0</button>
            </div>

            <!-- Buttons -->
            <div style="display:flex; gap:14px; margin-top:18px;">
                <button id="customCancel" class="modal-btn-red" style="background:#ccc;">Cancel</button>
                <button id="customApply" class="modal-btn-red">Apply</button>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <div class="loading-text">Processing...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
